<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Joan', serif;
        }
        
        a {
            text-decoration: none;
            color: #adadad;
        }
        
        .btn {
            display: inline-block;
            padding: .5rem 1rem;
            background-color: #cd8c38;
            border-radius: 2rem;
            color: #1e1f26;
            transition: .3s;
        }
        
        .btn:hover {
            background-color: #92601f;
        }
        
        .btn-l {
            width: 100%;
            text-align: center;
        }
        
        body {
            background-color: #1e1f26;
            display: grid;
            grid-template-columns: 1000px;
            justify-content: space-evenly;
        }
        
        
        /* top bar */
        
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 1rem;
        }
        
        .left-content,
        .right-content {
            display: flex;
            align-items: center;
        }
        
        .title {
            margin-right: 3rem;
            color: #cd8c38;
        }
        
        .navigation {
            display: flex;
            list-style: none;
        }
        
        .navigation li {
            margin-right: 1rem;
        }
        
        .navigation li a:hover {
            color: #cd8c38;
        }
        
        .active {
            color: #cd8c38;
        }
        
        .filter,
        .cart,
        .help,
        .menu {
            position: relative;
            width: 20px;
            height: 20px;
        }
        
        .filter,
        .cart,
        .help {
            margin-right: 1rem;
        }
        
        .menu {
            margin-left: .8rem;
        }
        
        .filter,
        .menu {
            display: none;
        }
        
        .profile-img-box {
            position: relative;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            overflow: hidden;
        }
        
        img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        
        /* main container */
        
        .main-container {
            color: #adadad;
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 2rem;
        }
        
        
        /* sidebar */
        
        .sidebar {
            background: linear-gradient(45deg, rgba(255, 255, 255, .05), rgba(205, 140, 56, .15));
            backdrop-filter: blur(5px);
            height: fit-content;
            border-radius: 1rem;
            padding: 2rem 2.5rem;
        }
        
        .sidebar-groups {
            margin-bottom: 1rem;
        }
        
        .sg-title {
            margin-bottom: .5rem;
            color: #fff;
        }
        
        input {
            margin-bottom: .6rem;
        }
        
        input[type=checkbox]:checked {
            accent-color: #cd8c38;
        }
        
        input[type=radio]:checked {
            accent-color: #cd8c38;
        }
        
        label {
            margin-left: .5rem;
        }
        
        
        /* movies container */
        
        .upcoming-img-box {
            position: relative;
            height: 300px;
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        .upcoming-title {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #cd8c38;
            background-color: #1e1f26;
            padding: .5rem 1rem;
            border-radius: 2rem;
            border: 1px solid #cd8c38;
            font-weight: 500;
        }
        
        .buttons {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
        }
        
        .btn-alt {
            background-color: #1e1f26;
            color: #cd8c38;
            border: 1px solid #cd8c38;
            margin-left: 1rem;
        }
        
        .btn-alt:hover {
            color: #1e1f26;
            background-color: #cd8c38;
        }
        
        
        /* current movies */
        
        .movies-container {
            padding-bottom: 2rem;
        }
        
        .current-movies {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        
        .current-movie {
            background: linear-gradient(45deg, rgba(255, 255, 255, .05), rgba(205, 140, 56, .15));
            padding: 1rem;
            border-radius: .5rem;
        }
        
        .cm-img-box {
            position: relative;
            height: 150px;
            width: auto;
            margin-bottom: 1rem;
            border-radius: .5rem;
            overflow: hidden;
        }
        
        .movie-title {
            color: #fff;
            margin-bottom: .2rem;
        }
        
        .booking {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
        }
        
        .price {
            color: #cd8c38;
        }
    </style>
</head>
<body>
    <section class="top-bar">
        <div class="left-content">
            <h2 class="title">BookMy Flick</h2>
            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a class="active" href="#">Movies</a></li>
                <li><a href="#">Theaters</a></li>
                <li><a href="#">News</a></li>
            </ul>
        </div>
        <div class="right-content">
           
            <a href="cart.html">
                <img src="images/cart.png" alt="cart">
            </a>
            <a href="#">
                <div class="profile-img-box">
                    <img src="images/profile.jpg" alt="">
                </div>
            </a>
        </div>
    </section>

    <section class="main-container">
        <div class="sidebar">
            <!-- Sidebar content (filters, categories, etc.) -->
        </div>

        <div class="movies-container">
            <div class="current-movies">
                <!-- Movie 1 -->
                <div class="current-movie">
                    <div class="cm-img-box">
                        <img src="images/movie1.jpg" alt="">
                    </div>
                    <h3 class="movie-title">Jurassic World</h3>
                    <p class="screen-name">Screen : Platinum</p>
                    <div class="booking">
                        <h2 class="price">$15</h2>
                        <button class="add-to-cart-btn" onclick="addToCart('Jurassic World', 15)">Add to Cart</button>
                    </div>
                </div>
                <!-- Movie 2 -->
                <div class="current-movie">
                    <div class="cm-img-box">
                        <img src="images/movie2.jpg" alt="">
                    </div>
                    <h3 class="movie-title">Vikram</h3>
                    <p class="screen-name">Screen : Gold</p>
                    <div class="booking">
                        <h2 class="price">$9</h2>
                        <button class="add-to-cart-btn" onclick="addToCart('Vikram', 9)">Add to Cart</button>
                    </div>
                </div>
                <!-- Movie 3 -->
                <div class="current-movie">
                    <div class="cm-img-box">
                        <img src="images/movie3.jpg" alt="">
                    </div>
                    <h3 class="movie-title">Firestarter</h3>
                    <p class="screen-name">Screen : Silver</p>
                    <div class="booking">
                        <h2 class="price">$5</h2>
                        <button class="add-to-cart-btn" onclick="addToCart('Firestarter', 5)">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function addToCart(movieName, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({ movieName, price });
            localStorage.setItem('cart', JSON.stringify(cart));
        }
    </script>
</body>
</html>
